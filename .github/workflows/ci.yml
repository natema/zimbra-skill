name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Byte-compile
        run: python -m py_compile zmail.py
      - name: Smoke test (no config needed)
        run: |
          python zmail.py --version
          python zmail.py --help
          python zmail.py draft --help
